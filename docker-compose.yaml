version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: movie_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - default
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: movie_php
    working_dir: /var/www/backend
    volumes:
      - ./:/var/www/backend
    networks:
      - default
    depends_on:
      - mysql
#      - redis
#      - elasticsearch

  mysql:
    image: mysql:8.0
    container_name: movie_mysql
    environment:
      MYSQL_DATABASE: movieland
      MYSQL_USER: movie
      MYSQL_PASSWORD: movie_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - default

#  redis:
#    image: redis:7-alpine
#    container_name: movie_redis
#    ports:
#      - "6380:6379"
#    networks:
#      - default

#  elasticsearch:
#    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
#    container_name: movie_elasticsearch
#    environment:
#      discovery.type: single-node
#      xpack.security.enabled: "false"
#      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
#    ports:
#      - "9200:9200"
#    volumes:
#      - elasticsearch_data:/usr/share/elasticsearch/data
#    networks:
#      - default

volumes:
  mysql_data:
  elasticsearch_data:

networks:
  default: